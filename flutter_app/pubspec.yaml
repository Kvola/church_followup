name: church_followup_mobile
description: Application mobile de suivi d'évangélisation pour les églises
publish_to: 'none'
version: 2.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.2.0
  provider: ^6.1.0
  intl: ^0.19.0
  share_plus: ^9.0.0
  pdf: ^3.10.0
  printing: ^5.13.0
  url_launcher: ^6.2.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#5B4FCF"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
